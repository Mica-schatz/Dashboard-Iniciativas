<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciativas BSC — Roadmap de Automatización</title>

<style>
  :root {
    --gold-grad:   linear-gradient(90deg, #f5e003 0%, #e8b820 25%, #d3a238 100%);
    --gold-grad-v: linear-gradient(135deg, #f5e003 0%, #e8b820 25%, #d3a238 100%);
    --bg:          #000000;
    --surface:     #0d0d0d;
    --surface2:    #161616;
    --border:      #2a2a2a;
    --border2:     #1a1a1a;
    --text:        #ffffff;
    --muted:       #666666;
    --muted2:      #999999;
    --danger:      #ff4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(245,224,3,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,224,3,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 0 32px; }
  header { padding: 28px 0 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 38px; height: 38px; background: var(--gold-grad-v); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 16px rgba(245,224,3,0.25); }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
  .logo-text span { background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .date-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--gold-grad); color: #000; box-shadow: 0 0 12px rgba(245,224,3,0.2); }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 20px rgba(245,224,3,0.35); }
  .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
  .btn-danger { background: rgba(255,68,68,0.12); color: var(--danger); border: 1px solid rgba(255,68,68,0.25); }
  .btn-danger:hover { background: rgba(255,68,68,0.22); }
  .tabs { display: flex; gap: 4px; padding: 20px 0 0; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer; color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: all 0.2s; position: relative; bottom: -1px; background: transparent; }
  .tab.active { background: var(--surface); border-color: var(--border); border-bottom-color: var(--surface); }
  .tab.active span { background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .tab:hover:not(.active) { color: var(--muted2); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px 0; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold-grad); }
  .kpi-card:hover { border-color: #3a3a3a; box-shadow: 0 0 20px rgba(245,224,3,0.07); }
  .kpi-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .kpi-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; line-height: 1; margin-bottom: 6px; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .kpi-sub { font-size: 12px; color: var(--muted); }
  .kpi-sub strong { color: #e8b820; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 12px 16px; text-align: left; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  thead th:first-child { border-left: 2px solid #e8b820; }
  tbody tr { border-bottom: 1px solid var(--border2); transition: background 0.15s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 14px 16px; vertical-align: middle; }
  .td-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 40px; }
  .macro-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; white-space: nowrap; letter-spacing: 0.5px; border: 1px solid; }
  .mp-text { font-size: 12px; color: var(--muted2); font-weight: 500; white-space: nowrap; }
  .initiative-name { font-weight: 600; color: var(--text); max-width: 200px; }
  .desc-text { font-size: 12px; color: var(--muted); max-width: 260px; line-height: 1.4; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; white-space: nowrap; letter-spacing: 0.3px; border: 1px solid; }
  .status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-no-iniciado   { background: rgba(100,100,100,0.12); color: var(--muted2);  border-color: rgba(100,100,100,0.2); }
  .status-no-iniciado::before   { background: var(--muted); }
  .status-en-desarrollo { background: rgba(255,255,255,0.08); color: #fff;           border-color: rgba(255,255,255,0.15); }
  .status-en-desarrollo::before { background: #fff; animation: pulse 1.5s infinite; }
  .status-testing       { background: rgba(232,184,32,0.12); color: #e8b820;         border-color: rgba(232,184,32,0.25); }
  .status-testing::before       { background: #e8b820; animation: pulse 1.5s infinite; }
  .status-finalizado    { background: rgba(245,224,3,0.15);  color: #f5e003;         border-color: rgba(245,224,3,0.3); }
  .status-finalizado::before    { background: #f5e003; }

  .hours-bar { display: flex; flex-direction: column; gap: 4px; min-width: 100px; }
  .hours-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); }
  .bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: var(--gold-grad); }
  .empty-val { font-size: 12px; color: var(--muted); font-style: italic; }
  .benefit-cell { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; white-space: nowrap; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .owner-chip { display: flex; align-items: center; gap: 7px; white-space: nowrap; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; background: rgba(245,224,3,0.1); color: #e8b820; border: 1px solid rgba(245,224,3,0.2); }
  .owner-name { font-size: 12px; color: var(--text); }
  .search-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; width: 220px; transition: border-color 0.2s; }
  .search-input:focus { border-color: #e8b820; }
  .search-input::placeholder { color: var(--muted); }
  .form-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; width: 100%; transition: border-color 0.2s; }
  .form-input:focus { border-color: #e8b820; }
  .form-input::placeholder { color: var(--muted); }
  .form-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; width: 100%; }
  .form-select:focus { border-color: #e8b820; }
  select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none; }
  select:focus { border-color: #e8b820; }
  .roadmap-container { overflow-x: auto; padding-bottom: 8px; }
  .quarter-label { padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; border-radius: 8px 8px 0 0; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; border: 1px solid var(--border); }
  .month-label { background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-align: center; }
  .roadmap-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .roadmap-label { min-width: 200px; flex-shrink: 0; }
  .roadmap-label-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .roadmap-label-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .roadmap-timeline { flex: 1; height: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; position: relative; overflow: hidden; }
  .roadmap-bar { position: absolute; top: 4px; height: 28px; border-radius: 4px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 900px) { .metrics-grid { grid-template-columns: 1fr; } }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
  .chart-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--gold-grad); }
  .chart-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .donut-wrap { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .legend { display: flex; flex-direction: column; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-value { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-left: auto; padding-left: 16px; }
  .hbar-list { display: flex; flex-direction: column; gap: 12px; }
  .hbar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .hbar-label { font-size: 12px; color: var(--text); font-weight: 500; }
  .hbar-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .hbar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .hbar-fill { height: 100%; border-radius: 3px; background: var(--gold-grad); }
  .toast { position: fixed; bottom: 28px; right: 28px; z-index: 999; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 13px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: flex; align-items: center; gap: 10px; animation: slideIn 0.25s ease; max-width: 340px; }
  .toast.success::before { content:'✓'; width:20px;height:20px;background:var(--gold-grad);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0; }
  .toast.error::before   { content:'!'; width:20px;height:20px;background:#ff4444;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(6px); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid #333; border-radius: 16px; padding: 28px; max-width: 580px; width: 90%; position: relative; animation: fadeUp 0.2s ease; box-shadow: 0 0 60px rgba(245,224,3,0.08); max-height: 90vh; overflow-y: auto; }
  .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold-grad); border-radius: 16px 16px 0 0; }

  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { color: var(--text); border-color: var(--muted); }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
  .modal-meta { font-size: 12px; color: var(--muted); margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .modal-field-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .modal-field-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .modal-desc { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.6; color: var(--muted2); margin-top: 12px; }
  .empty-state { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
</style>
</head>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Iniciativas<span> BSC LAS</span></div>
    </div>
    <div class="header-right">
      <div class="date-badge" id="currentDate"></div>

      <button class="btn btn-primary" onclick="exportData()">Exportar</button>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('overview')"><span>📊 Overview</span></div>
    <div class="tab" onclick="switchTab('tracking')"><span>📋 Tracking</span></div>
    <div class="tab" onclick="switchTab('roadmap')"><span>🗓 Roadmap</span></div>
    <div class="tab" onclick="switchTab('metrics')"><span>📈 Métricas</span></div>
  </div>
  <div id="tab-overview" class="tab-panel active">
    <div class="kpi-row" id="kpiRow"></div>
    <div class="section-header"><div class="section-title">Iniciativas Activas</div></div>
    <div class="table-wrap" id="overviewTable"></div>
  </div>
  <div id="tab-tracking" class="tab-panel">
    <div style="padding:20px 0 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <input class="search-input" type="text" placeholder="🔍 Buscar iniciativa..." id="searchInput" oninput="renderTrackingTable()">
      <select id="filterStatus" onchange="renderTrackingTable()">
        <option value="">Todos los Status</option>
        <option>No iniciado</option><option>En desarrollo</option><option>Testing usuario</option><option>Finalizado</option>
      </select>
      <select id="filterMacro" onchange="renderTrackingTable()"><option value="">Todos los MACRO</option></select>
      <select id="filterOwner" onchange="renderTrackingTable()"><option value="">Todos los Owners</option></select>
    </div>
    <div class="table-wrap" id="trackingTable"></div>
  </div>
  <div id="tab-roadmap" class="tab-panel">
    <div style="padding:20px 0 16px;display:flex;gap:12px;align-items:center;">
      <span style="font-size:13px;color:var(--muted);">Año:</span>
      <select id="roadmapYear" onchange="renderRoadmap()">
        <option value="2024">2024</option><option value="2025" selected>2025</option><option value="2026">2026</option>
      </select>
    </div>
    <div class="roadmap-container" id="roadmapView"></div>
  </div>
  <div id="tab-metrics" class="tab-panel">
    <div style="padding:16px 0;"></div>
    <div class="metrics-grid" id="metricsView"></div>
  </div>
</div>
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

function initials(n){ return (n||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); }
function hasVal(v){ return v!==null&&v!==undefined&&v!==''; }
function fmtHoras(v){ return hasVal(v)?Number(v).toLocaleString()+"h":"—"; }

document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-ES',{weekday:'short',year:'numeric',month:'short',day:'numeric'});

function showToast(msg,type='success'){
  const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.4s';setTimeout(()=>t.remove(),400);},3500);
}

function exportData(){
  const headers=['ID','MACRO','MP','Iniciativa','Descripción','Status','Horas','Beneficio $','Owner','Quarter'];
  const rows=initiatives.map(i=>[i.id,i.macro,i.mp,`"${(i.initiative||'').replace(/"/g,'""')}"`,`"${(i.desc||'').replace(/"/g,'""')}"`,i.status,hasVal(i.horas)?i.horas:'',hasVal(i.beneficio)?i.beneficio:'',i.owner,i.q||'']);
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`autopath_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url); showToast('CSV exportado correctamente');
}

function macroOptions(selected=''){ return [...new Set(initiatives.map(i=>i.macro))].concat(MACROS).filter((v,i,a)=>a.indexOf(v)===i).map(m=>`<option value="${m}" ${m===selected?'selected':''}>${m}</option>`).join(''); }
function statusOptions(selected='No iniciado'){ return ['No iniciado','En desarrollo','Testing usuario','Finalizado'].map(s=>`<option ${s===selected?'selected':''}>${s}</option>`).join(''); }
function quarterOptions(selected=''){ const qs=['','Q1 2025','Q2 2025','Q3 2025','Q4 2025','Q1 2026','Q2 2026','Q3 2026','Q4 2026']; return qs.map(q=>`<option value="${q}" ${q===selected?'selected':''}>${q||'Sin Q aún'}</option>`).join(''); }

function formHTML(prefix,row={}){
  return `<div style="display:flex;flex-direction:column;gap:14px;">
    <div><div class="modal-field-label">Iniciativa *</div><input class="form-input" id="${prefix}_initiative" placeholder="Nombre" value="${(row.initiative||'').replace(/"/g,'&quot;')}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div><div class="modal-field-label">MACRO *</div><select class="form-select" id="${prefix}_macro"><option value="">Seleccionar...</option>${macroOptions(row.macro||'')}</select></div>
      <div><div class="modal-field-label">MP</div><input class="form-input" id="${prefix}_mp" value="${row.mp||''}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div><div class="modal-field-label">Status</div><select class="form-select" id="${prefix}_status">${statusOptions(row.status||'No iniciado')}</select></div>
      <div><div class="modal-field-label">Quarter</div><select class="form-select" id="${prefix}_q">${quarterOptions(row.q||'')}</select></div>
    </div>
    <div><div class="modal-field-label">Descripción</div><textarea class="form-input" id="${prefix}_desc" style="height:80px;resize:none">${row.desc||''}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div><div class="modal-field-label">Horas</div><input class="form-input" id="${prefix}_horas" type="number" min="0" placeholder="—" value="${hasVal(row.horas)?row.horas:''}"></div>
      <div><div class="modal-field-label">Beneficio $</div><input class="form-input" id="${prefix}_beneficio" type="number" min="0" placeholder="—" value="${hasVal(row.beneficio)?row.beneficio:''}"></div>
      <div><div class="modal-field-label">Owner</div><input class="form-input" id="${prefix}_owner" value="${row.owner||''}"></div>
    </div>
  </div>
  <div id="${prefix}_error" style="color:var(--danger);font-size:12px;margin-top:10px;display:none;"></div>`;
}

function readForm(prefix){
  return {
    initiative: document.getElementById(`${prefix}_initiative`).value.trim(),
    macro:      document.getElementById(`${prefix}_macro`).value,
    mp:         document.getElementById(`${prefix}_mp`).value.trim()||'—',
    status:     document.getElementById(`${prefix}_status`).value,
    q:          document.getElementById(`${prefix}_q`).value||null,
    desc:       document.getElementById(`${prefix}_desc`).value.trim()||'Sin descripción.',
    horas:      document.getElementById(`${prefix}_horas`).value!==''?parseInt(document.getElementById(`${prefix}_horas`).value):null,
    beneficio:  document.getElementById(`${prefix}_beneficio`).value!==''?parseInt(document.getElementById(`${prefix}_beneficio`).value):null,
    owner:      document.getElementById(`${prefix}_owner`).value.trim()||'Sin asignar',
  };
}

function validateForm(prefix){
  const errEl=document.getElementById(`${prefix}_error`), data=readForm(prefix);
  if(!data.initiative){errEl.textContent='El nombre es obligatorio.';errEl.style.display='block';return null;}
  if(!data.macro){errEl.textContent='Seleccioná un MACRO.';errEl.style.display='block';return null;}
  errEl.style.display='none'; return data;
}

function openAddModal(){
  document.getElementById('modalContent').innerHTML=`<div class="modal-title">Nueva Iniciativa</div><div style="color:var(--muted);font-size:13px;margin-bottom:20px">Horas, beneficio y Q son opcionales.</div>${formHTML('f')}<div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary" style="flex:1" onclick="saveNewInitiative()">Guardar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`;
  document.getElementById('detailModal').classList.add('open');
}

function saveNewInitiative(){
  const data=validateForm('f'); if(!data) return;
  initiatives.push({id:nextId++,...data});
  closeModal(); refreshAll(); showToast(`"${data.initiative}" creada`);
}

function openEditModal(id){
  const row=initiatives.find(i=>i.id===id); if(!row) return;
  document.getElementById('modalContent').innerHTML=`<div class="modal-title">Editar Iniciativa</div><div style="color:var(--muted);font-size:13px;margin-bottom:20px">ID #${String(row.id).padStart(3,'0')}</div>${formHTML('e',row)}<div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary" style="flex:1" id="saveBtnEdit" onclick="saveEditInitiative(${id})">Guardar Cambios</button><button class="btn btn-danger" onclick="deleteInitiative(${id})">Eliminar</button><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>`;
  document.getElementById('detailModal').classList.add('open');
}

function saveEditInitiative(id){
  const data=validateForm('e'); if(!data) return;
  const idx=initiatives.findIndex(i=>i.id===id); if(idx===-1) return;
  initiatives[idx]={...initiatives[idx],...data};
  closeModal(); refreshAll(); showToast(`"${data.initiative}" actualizada`);
}

function deleteInitiative(id){
  const row=initiatives.find(i=>i.id===id);
  if(!row||!confirm(`¿Eliminar "${row.initiative}"?`)) return;
  initiatives=initiatives.filter(i=>i.id!==id);
  closeModal(); refreshAll(); showToast('Iniciativa eliminada','error');
}

function openDetail(id){
  const row=initiatives.find(i=>i.id===id); if(!row) return;
  const mc=macroColors[row.macro]||{bg:'rgba(100,100,100,0.1)',color:'#999',border:'rgba(100,100,100,0.2)'};
  document.getElementById('modalContent').innerHTML=`
    <div style="margin-bottom:6px;"><span class="macro-badge" style="background:${mc.bg};color:${mc.color};border-color:${mc.border}">${row.macro}</span><span style="font-size:11px;color:var(--muted);margin-left:8px;">${row.mp}</span></div>
    <div class="modal-title">${row.initiative}</div>
    <div class="modal-meta"><span class="status-badge ${statusMap[row.status]||''}">${row.status}</span>${row.q?`<span style="color:var(--muted)">·</span><span style="color:var(--muted2)">${row.q}</span>`:''}</div>
    <div class="modal-row">
      <div><div class="modal-field-label">Horas</div><div class="modal-field-value" style="font-family:'DM Mono',monospace">${fmtHoras(row.horas)}</div></div>
      <div><div class="modal-field-label">Beneficio</div><div class="modal-field-value">${hasVal(row.beneficio)?`<span class="benefit-cell">$${Number(row.beneficio).toLocaleString()}</span>`:'<span style="color:var(--muted)">—</span>'}</div></div>
      <div><div class="modal-field-label">Owner</div><div class="modal-field-value"><div class="owner-chip"><div class="avatar">${initials(row.owner)}</div><span>${row.owner}</span></div></div></div>
      <div><div class="modal-field-label">ID</div><div class="modal-field-value" style="font-family:'DM Mono',monospace;color:var(--muted)">#${String(row.id).padStart(3,'0')}</div></div>
    </div>
    <div class="modal-field-label" style="margin-bottom:6px">Descripción</div>
    <div class="modal-desc">${row.desc}</div>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button class="btn btn-primary" style="flex:1" onclick="openEditModal(${row.id})">Editar</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
    </div>`;
  document.getElementById('detailModal').classList.add('open');
}

function closeModal(){ document.getElementById('detailModal').classList.remove('open'); }
document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function refreshAll(){
  renderKPIs(); renderOverviewTable(); resetFilters();
}

function resetFilters(){
  const mSel=document.getElementById('filterMacro'),oSel=document.getElementById('filterOwner');
  mSel.innerHTML='<option value="">Todos los MACRO</option>';
  oSel.innerHTML='<option value="">Todos los Owners</option>';
  [...new Set(initiatives.map(i=>i.macro))].forEach(m=>{const o=document.createElement('option');o.textContent=m;mSel.appendChild(o);});
  [...new Set(initiatives.map(i=>i.owner))].forEach(m=>{const o=document.createElement('option');o.textContent=m;oSel.appendChild(o);});
  renderTrackingTable();
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{const tabs=['overview','tracking','roadmap','metrics'];t.classList.toggle('active',tabs[i]===name);});
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='roadmap') renderRoadmap();
  if(name==='metrics') renderMetrics();
  if(name==='tracking') resetFilters();
}

function renderKPIs(){
  const TARGET_HORAS = 200;
  const año2026 = initiatives.filter(i => i.q && i.q.includes('2026'));
  const horasEntregadas = año2026.filter(i => i.status === 'Finalizado' && hasVal(i.horas)).reduce((s,i) => s + i.horas, 0);
  const pct = Math.min(Math.round(horasEntregadas / TARGET_HORAS * 100), 100);
  const angulo = -100 + (pct / 100) * 270;
  const colorAguja = pct >= 100 ? '#f5e003' : pct >= 60 ? '#e8b820' : '#ffffff';

  const total = initiatives.length;
  const fin   = initiatives.filter(i => i.status === 'Finalizado').length;
  const dev   = initiatives.filter(i => i.status === 'En desarrollo').length;

  const gaugeHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;">
      <svg viewBox="0 0 200 120" width="180" height="108" style="overflow:visible">
        <defs>
          <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#2a2a2a"/>
            <stop offset="60%"  stop-color="#e8b820"/>
            <stop offset="100%" stop-color="#f5e003"/>
          </linearGradient>
        </defs>
        <!-- Track gris -->
        <path d="M 20 110 A 80 80 0 1 1 180 110" fill="none" stroke="#1e1e1e" stroke-width="16" stroke-linecap="round"/>
        <!-- Arco de progreso -->
        <path d="M 20 110 A 80 80 0 1 1 180 110" fill="none" stroke="url(#arcGrad)" stroke-width="16" stroke-linecap="round"
          stroke-dasharray="${ (pct / 100) * 251.2 } 251.2"/>
        <!-- Marcas target -->
        <line x1="180" y1="110" x2="190" y2="110" stroke="#f5e003" stroke-width="2" opacity="0.6"/>
        <text x="193" y="114" font-size="8" fill="#f5e003" font-family="DM Mono" opacity="0.8">${TARGET_HORAS}h</text>
        <!-- Aguja -->
        <g transform="translate(100,110) rotate(${angulo})">
          <line x1="0" y1="0" x2="0" y2="-68" stroke="${colorAguja}" stroke-width="2" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5" fill="${colorAguja}"/>
          <circle cx="0" cy="0" r="2.5" fill="#000"/>
        </g>
        <!-- Valor central -->
        <text x="100" y="96" text-anchor="middle" font-family="Syne" font-size="20" font-weight="800" fill="${colorAguja}">${horasEntregadas}h</text>
        <!-- Labels -->
        <text x="18"  y="126" text-anchor="middle" font-size="8" fill="#555" font-family="DM Mono">0h</text>
        <text x="100" y="130" text-anchor="middle" font-size="9" fill="#666" font-family="DM Mono">${pct}% del target</text>
      </svg>
    </div>`;

  const kpis = [
    {
      label: "Total Iniciativas",
      value: total,
      sub: `<strong>${fin} finalizadas</strong> / ${dev} en desarrollo`
    },
    {
      label: "Horas 2026 — Entregadas vs Target",
      value: gaugeHTML,
      isGauge: true
    },
    {
      label: "Tasa Finalización (Horas)",
      value: TARGET_HORAS > 0 ? Math.min(Math.round(horasEntregadas / TARGET_HORAS * 100), 100) + "%" : "—",
      sub: `<strong>${horasEntregadas}h</strong> entregadas de <strong>${TARGET_HORAS}h</strong> target`
    },
  ];

  document.getElementById('kpiRow').innerHTML = kpis.map(k =>
    k.isGauge
      ? `<div class="kpi-card" style="grid-column:span 2;min-height:160px;display:flex;flex-direction:column;">
           <div class="kpi-label">${k.label}</div>
           ${k.value}
         </div>`
      : `<div class="kpi-card">
           <div class="kpi-label">${k.label}</div>
           <div class="kpi-value">${k.value}</div>
           <div class="kpi-sub">${k.sub}</div>
         </div>`
  ).join('');
}
function renderOverviewTable(){
  document.getElementById('overviewTable').innerHTML=buildTable(initiatives.filter(i=>i.status==='En desarrollo'||i.status==='Testing usuario'),false);
}

function renderTrackingTable(){
  const search=(document.getElementById('searchInput')||{value:''}).value.toLowerCase();
  const status=(document.getElementById('filterStatus')||{value:''}).value;
  const macro=(document.getElementById('filterMacro')||{value:''}).value;
  const owner=(document.getElementById('filterOwner')||{value:''}).value;
  let filtered=initiatives.filter(i=>{
    if(search&&!i.initiative.toLowerCase().includes(search)&&!(i.desc||'').toLowerCase().includes(search)) return false;
    if(status&&i.status!==status) return false;
    if(macro&&i.macro!==macro) return false;
    if(owner&&i.owner!==owner) return false;
    return true;
  });
  document.getElementById('trackingTable').innerHTML=buildTable(filtered,true);
}

function buildTable(data,full=false){
  if(!data.length) return '<div class="empty-state">No se encontraron iniciativas.</div>';
  const horasConValor=initiatives.filter(i=>hasVal(i.horas));
  const maxH=horasConValor.length?Math.max(...horasConValor.map(i=>i.horas)):1;
  const rows=data.map(row=>{
    const mc=macroColors[row.macro]||{bg:'rgba(100,100,100,0.1)',color:'#999',border:'rgba(100,100,100,0.2)'};
    const horasCell=hasVal(row.horas)?`<div class="hours-bar"><span class="hours-num">${Number(row.horas).toLocaleString()}h</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(row.horas/maxH*100)}%"></div></div></div>`:`<span class="empty-val">—</span>`;
    const benCell=hasVal(row.beneficio)?`<span class="benefit-cell">$${Number(row.beneficio).toLocaleString()}</span>`:`<span class="empty-val">—</span>`;
    return `<tr onclick="openDetail(${row.id})"><td class="td-num">${row.id}</td><td><span class="macro-badge" style="background:${mc.bg};color:${mc.color};border-color:${mc.border}">${row.macro}</span></td><td><span class="mp-text">${row.mp}</span></td><td><div class="initiative-name">${row.initiative}</div></td>${full?`<td><div class="desc-text">${row.desc}</div></td>`:''}<td><span class="status-badge ${statusMap[row.status]||''}">${row.status}</span></td><td>${horasCell}</td><td>${benCell}</td><td><div class="owner-chip"><div class="avatar">${initials(row.owner)}</div><span class="owner-name">${row.owner}</span></div></td></tr>`;
  }).join('');
  return `<table><thead><tr><th>#</th><th>MACRO</th><th>MP</th><th>Iniciativa</th>${full?'<th>Descripción</th>':''}<th>Status</th><th>Horas</th><th>Beneficio $</th><th>Owner</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderRoadmap(){
  const year=document.getElementById('roadmapYear').value;
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const qOrder=['Q1','Q2','Q3','Q4'];
  const relevant=initiatives.filter(i=>i.q&&i.q.includes(year));
  let html=`<div style="display:flex;margin-bottom:4px;"><div style="min-width:212px;flex-shrink:0;"></div><div style="flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;">`;
  qOrder.forEach(q=>{html+=`<div class="quarter-label">${q} ${year}</div>`;});
  html+=`</div></div><div style="display:flex;margin-bottom:16px;"><div style="min-width:212px;flex-shrink:0;"></div><div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:1px;">`;
  months.forEach(m=>{html+=`<div class="month-label">${m}</div>`;});
  html+=`</div></div>`;
  if(!relevant.length){document.getElementById('roadmapView').innerHTML=html+'<div class="empty-state">No hay iniciativas con Q asignado para este año.</div>';return;}
  const groups={};
  relevant.forEach(i=>{if(!groups[i.macro])groups[i.macro]=[];groups[i.macro].push(i);});
  let body='';
  Object.entries(groups).forEach(([macro,items])=>{
    const mc=macroColors[macro]||{color:'#999'};
    body+=`<div style="font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:${mc.color};letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px;">${macro}</div>`;
    items.forEach(item=>{
      const qIdx=qOrder.indexOf((item.q||'').split(' ')[0]);
      const left=(Math.max(0,qIdx)/4)*100;
      const bc=roadmapBarColor[item.status]||{bg:'#2a2a2a',text:'#666'};
      body+=`<div class="roadmap-row" onclick="openDetail(${item.id})" style="cursor:pointer;">
        <div class="roadmap-label" style="min-width:220px;max-width:220px;">
          <div class="roadmap-label-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:210px;" title="${item.initiative}">${item.initiative}</div>
          <div class="roadmap-label-meta">${item.owner}${hasVal(item.horas)?' · '+item.horas+'h':''}</div>
        </div>
        <div class="roadmap-timeline" style="flex:1;min-width:0;">
          <div class="roadmap-bar" style="left:${left}%;width:calc(25% - 8px);min-width:64px;background:${bc.bg};color:${bc.text};overflow:hidden;white-space:nowrap;">
            ${item.status==='Finalizado'?'✓ ':''}${item.q}
          </div>
        </div>
      </div>`;
    });
  });
  document.getElementById('roadmapView').innerHTML=html+body;
}

function renderMetrics(){
  const statusCounts={};
  initiatives.forEach(i=>{statusCounts[i.status]=(statusCounts[i.status]||0)+1;});
  const total=initiatives.length||1;
  const sEntries=Object.entries(statusCounts);
  const R=52,cx=68,cy=68,sw=18,circ=2*Math.PI*R;
  let off=0;
  const segs=sEntries.map(([s,v])=>{const dash=(v/total)*circ;const seg={s,v,color:statusColors[s]||'#555',da:`${dash} ${circ-dash}`,off};off+=dash;return seg;});
  const donut=`<svg width="136" height="136" viewBox="0 0 136 136"><circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1a1a1a" stroke-width="${sw}"/>${segs.map(s=>`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-dasharray="${s.da}" stroke-dashoffset="-${s.off}" transform="rotate(-90 ${cx} ${cy})"/>`).join('')}<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#e8b820" font-family="Syne" font-size="22" font-weight="800">${initiatives.length}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#555" font-size="9" font-family="DM Mono">TOTAL</text></svg>`;
  const legend=sEntries.map(([s,v])=>`<div class="legend-item"><div class="legend-dot" style="background:${statusColors[s]||'#555'}"></div><span style="color:#ccc">${s}</span><span class="legend-value">${v} (${Math.round(v/total*100)}%)</span></div>`).join('');
  const macroBen={};
  initiatives.forEach(i=>{if(hasVal(i.beneficio))macroBen[i.macro]=(macroBen[i.macro]||0)+i.beneficio;});
  const maxBen=Object.values(macroBen).length?Math.max(...Object.values(macroBen)):1;
  const benBars=Object.entries(macroBen).sort((a,b)=>b[1]-a[1]).map(([m,v])=>`<div class="hbar-item"><div class="hbar-top"><span class="hbar-label">${m}</span><span class="hbar-val">$${v.toLocaleString()}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.round(v/maxBen*100)}%"></div></div></div>`).join('')||'<div class="empty-state" style="padding:16px">Sin datos aún.</div>';
  const ownerH={};
  initiatives.forEach(i=>{if(hasVal(i.horas))ownerH[i.owner]=(ownerH[i.owner]||0)+i.horas;});
  const maxH2=Object.values(ownerH).length?Math.max(...Object.values(ownerH)):1;
  const hourBars=Object.entries(ownerH).sort((a,b)=>b[1]-a[1]).map(([o,v])=>`<div class="hbar-item"><div class="hbar-top"><span class="hbar-label">${o}</span><span class="hbar-val">${v.toLocaleString()}h</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.round(v/maxH2*100)}%"></div></div></div>`).join('')||'<div class="empty-state" style="padding:16px">Sin datos aún.</div>';
  const roiBars=[...initiatives].filter(i=>hasVal(i.beneficio)).sort((a,b)=>b.beneficio-a.beneficio).slice(0,6).map(i=>`<div class="hbar-item"><div class="hbar-top"><span class="hbar-label" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.initiative}</span><span class="hbar-val">$${Number(i.beneficio).toLocaleString()}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.round(i.beneficio/maxBen*100)}%"></div></div></div>`).join('')||'<div class="empty-state" style="padding:16px">Sin datos aún.</div>';
  document.getElementById('metricsView').innerHTML=`<div class="chart-card"><div class="chart-title">Estado de Iniciativas</div><div class="donut-wrap">${donut}<div class="legend">${legend}</div></div></div><div class="chart-card"><div class="chart-title">Beneficio $ por Área</div><div class="hbar-list">${benBars}</div></div><div class="chart-card"><div class="chart-title">Horas por Owner</div><div class="hbar-list">${hourBars}</div></div><div class="chart-card"><div class="chart-title">Top Beneficio por Iniciativa</div><div class="hbar-list">${roiBars}</div></div>`;
}

renderKPIs();
renderOverviewTable();
resetFilters();
</script>
</body>
</html>
